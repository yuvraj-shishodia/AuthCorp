version: '3.8'

services:
  # Core Infrastructure
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: authcorp
      POSTGRES_USER: authcorp
      POSTGRES_PASSWORD: authcorp_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - authcorp-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - authcorp-network    

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: authcorp
      MINIO_ROOT_PASSWORD: authcorp_secure_pass
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - authcorp-network

  # Core Services
  ingest-service:
    build: ./services/ingest
    environment:
      - DATABASE_URL=postgresql://authcorp:authcorp_secure_pass@postgres:5432/authcorp
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=authcorp
      - S3_SECRET_KEY=authcorp_secure_pass
      - REDIS_URL=redis://redis:6379
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./uploads:/app/uploads
    networks:
      - authcorp-network

  detector-ela:
    build: ./services/detectors/ela
    environment:
      - MODEL_VERSION=1.0.0
      - REDIS_URL=redis://redis:6379
    ports:
      - "8002:8000"
    depends_on:
      - redis
    networks:
      - authcorp-network

  detector-quantization:
    build: ./services/detectors/quantization
    environment:
      - MODEL_VERSION=1.0.0
      - REDIS_URL=redis://redis:6379
    ports:
      - "8003:8000"
    depends_on:
      - redis
    networks:
      - authcorp-network

  detector-metadata:
    build: ./services/detectors/metadata
    environment:
      - MODEL_VERSION=1.0.0
      - REDIS_URL=redis://redis:6379
    ports:
      - "8004:8000"
    depends_on:
      - redis
    networks:
      - authcorp-network

  fusion-service:
    build: ./services/fusion
    environment:
      - DATABASE_URL=postgresql://authcorp:authcorp_secure_pass@postgres:5432/authcorp
      - REDIS_URL=redis://redis:6379
      - MODEL_REGISTRY_PATH=/app/models
    ports:
      - "8005:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./models:/app/models
    networks:
      - authcorp-network

  ocr-service:
    build: ./services/ocr
    environment:
      - TESSERACT_MODELS_PATH=/usr/share/tesseract-ocr/4.00/tessdata
      - REDIS_URL=redis://redis:6379
    ports:
      - "8006:8000"
    depends_on:
      - redis
    networks:
      - authcorp-network

  risk-service:
    build: ./services/risk
    environment:
      - DATABASE_URL=postgresql://authcorp:authcorp_secure_pass@postgres:5432/authcorp
      - REDIS_URL=redis://redis:6379
    ports:
      - "8007:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - authcorp-network

  report-service:
    build: ./services/report
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://authcorp:authcorp_secure_pass@postgres:5432/authcorp
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=authcorp
      - S3_SECRET_KEY=authcorp_secure_pass
      - REDIS_URL=redis://redis:6379
    ports:
      - "8008:8000"
    depends_on:
      - postgres
      - minio
    networks:
      - authcorp-network

  # Frontend
  frontend:
    build: .
    env_file:
      - .env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - ingest-service
    networks:
      - authcorp-network

  # Authentication Service
  auth-service:
    build: ./services/auth
    env_file:
      - .env.local
    environment:
      - REDIS_URL=redis://redis:6379
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    ports:
      - "8009:8009"
    depends_on:
      - redis
    networks:
      - authcorp-network

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: authcorp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./services/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./services/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - authcorp-network

  grafana:
    image: grafana/grafana:latest
    container_name: authcorp-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./services/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=authcorp123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - authcorp-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: authcorp-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - authcorp-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: authcorp-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - authcorp-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: authcorp-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./services/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - authcorp-network

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  authcorp-network:
    driver: bridge
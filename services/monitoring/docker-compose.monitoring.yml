version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: forensix-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - forensix-network

  grafana:
    image: grafana/grafana:latest
    container_name: forensix-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=forensix123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - forensix-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: forensix-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - forensix-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: forensix-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - forensix-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: forensix-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - forensix-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: forensix-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:password@postgres:5432/forensix?sslmode=disable
    depends_on:
      - postgres
    networks:
      - forensix-network

  # Redis for monitoring data
  redis:
    image: redis:7-alpine
    container_name: forensix-monitoring-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_monitoring_data:/data
    networks:
      - forensix-network

  # PostgreSQL for monitoring data
  postgres:
    image: postgres:15-alpine
    container_name: forensix-monitoring-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=forensix_monitoring
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_monitoring_data:/var/lib/postgresql/data
    networks:
      - forensix-network

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  redis_monitoring_data:
  postgres_monitoring_data:

networks:
  forensix-network:
    external: true